<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>آیکون پازل جعبه‌چین</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: system-ui, sans-serif;
  }

  .icon {
    width: 512px;
    height: 512px;
    position: relative;
    background: linear-gradient(135deg, #f97316 0%, #dc2626 50%, #991b1b 100%);
    border-radius: 96px;
    overflow: hidden;
    box-shadow:
      0 0 0 8px rgba(0,0,0,0.15),
      inset 0 -20px 40px rgba(0,0,0,0.3),
      inset 0 20px 40px rgba(255,255,255,0.15);
  }

  /* Glow orbs in background */
  .orb-1 {
    position: absolute;
    top: -80px;
    right: -80px;
    width: 250px;
    height: 250px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(251, 191, 36, 0.6) 0%, transparent 70%);
    filter: blur(20px);
  }

  .orb-2 {
    position: absolute;
    bottom: -60px;
    left: -60px;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(168, 85, 247, 0.4) 0%, transparent 70%);
    filter: blur(20px);
  }

  /* The crate (box) - 3D isometric look */
  .crate {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-8deg);
    width: 280px;
    height: 280px;
  }

  /* Crate top face */
  .crate-top {
    position: absolute;
    top: 0;
    left: 30px;
    width: 250px;
    height: 70px;
    background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
    transform: skewX(-45deg);
    transform-origin: bottom left;
    border-radius: 8px 8px 0 0;
    box-shadow: inset 0 -8px 0 rgba(0,0,0,0.2);
  }

  /* Crate left face */
  .crate-left {
    position: absolute;
    top: 35px;
    left: 0;
    width: 60px;
    height: 210px;
    background: linear-gradient(135deg, #d97706 0%, #92400e 100%);
    transform: skewY(45deg);
    transform-origin: top left;
    border-radius: 0 0 0 8px;
    box-shadow: inset -8px 0 0 rgba(0,0,0,0.2);
  }

  /* Crate front face (main) */
  .crate-front {
    position: absolute;
    top: 35px;
    left: 30px;
    width: 250px;
    height: 210px;
    background: linear-gradient(135deg, #d97706 0%, #b45309 60%, #78350f 100%);
    border-radius: 8px;
    box-shadow:
      inset 0 -10px 0 rgba(0,0,0,0.3),
      inset 0 4px 0 rgba(255,255,255,0.2),
      inset 4px 0 0 rgba(255,255,255,0.1),
      inset -4px 0 0 rgba(0,0,0,0.2),
      0 20px 40px rgba(0,0,0,0.4);
  }

  /* Wood planks - horizontal lines */
  .plank-1 {
    position: absolute;
    top: 35px;
    left: 30px;
    width: 250px;
    height: 8px;
    background: rgba(0,0,0,0.4);
    margin-top: 40px;
  }

  .plank-2 {
    position: absolute;
    top: 35px;
    left: 30px;
    width: 250px;
    height: 8px;
    background: rgba(0,0,0,0.4);
    margin-top: 130px;
  }

  /* X bracing pattern */
  .x-pattern {
    position: absolute;
    top: 75px;
    left: 60px;
    width: 190px;
    height: 140px;
    opacity: 0.4;
  }

  .x-line-1 {
    position: absolute;
    top: 0;
    left: 0;
    width: 240px;
    height: 6px;
    background: #000;
    transform: rotate(36deg);
    transform-origin: top left;
  }

  .x-line-2 {
    position: absolute;
    top: 0;
    right: 0;
    width: 240px;
    height: 6px;
    background: #000;
    transform: rotate(-36deg);
    transform-origin: top right;
  }

  /* Highlight on crate */
  .crate-highlight {
    position: absolute;
    top: 45px;
    left: 40px;
    width: 80px;
    height: 50px;
    background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 100%);
    border-radius: 8px;
    pointer-events: none;
  }

  /* Goal target (yellow ring) - small accent */
  .goal {
    position: absolute;
    top: 80px;
    right: 70px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 5px dashed #fbbf24;
    background: radial-gradient(circle, rgba(251, 191, 36, 0.3) 0%, transparent 70%);
    box-shadow: 0 0 20px rgba(251, 191, 36, 0.6);
    z-index: 5;
  }

  .goal::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #fbbf24;
    box-shadow: 0 0 10px #fbbf24;
  }

  /* Checkmark badge - shows "completed" feel */
  .badge {
    position: absolute;
    top: 30px;
    right: 30px;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, #10b981 0%, #047857 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 8px 20px rgba(16, 185, 129, 0.5),
      inset 0 -4px 0 rgba(0,0,0,0.2),
      inset 0 4px 0 rgba(255,255,255,0.2);
    z-index: 10;
  }

  .badge-check {
    color: white;
    font-size: 56px;
    font-weight: 900;
    line-height: 1;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    transform: translateY(-2px);
  }

  /* Subtle dots pattern */
  .dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 16px 16px;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="icon">
  <div class="orb-1"></div>
  <div class="orb-2"></div>
  <div class="dots"></div>

  <div class="crate">
    <div class="crate-top"></div>
    <div class="crate-left"></div>
    <div class="crate-front"></div>
    <div class="plank-1"></div>
    <div class="plank-2"></div>
    <div class="x-pattern">
      <div class="x-line-1"></div>
      <div class="x-line-2"></div>
    </div>
    <div class="crate-highlight"></div>
  </div>

  <div class="goal"></div>

  <div class="badge">
    <span class="badge-check">✓</span>
  </div>
</div>

</body>
</html>
