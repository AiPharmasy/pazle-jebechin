<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>App Icon — پازل جعبه‌چین</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  /* Main icon container - rounded square (squircle) */
  .icon {
    width: 512px;
    height: 512px;
    position: relative;
    /* Squircle-like border radius */
    border-radius: 115px;
    overflow: hidden;
    /* Deep navy gradient background */
    background:
      radial-gradient(circle at 30% 20%, rgba(99, 102, 241, 0.35) 0%, transparent 50%),
      radial-gradient(circle at 70% 80%, rgba(236, 72, 153, 0.25) 0%, transparent 50%),
      linear-gradient(145deg, #0f172a 0%, #020617 100%);
    box-shadow:
      0 0 0 6px rgba(255, 255, 255, 0.04),
      inset 0 4px 12px rgba(255, 255, 255, 0.08),
      inset 0 -8px 24px rgba(0, 0, 0, 0.6);
  }

  /* Subtle grid pattern */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.6;
  }

  /* Top glow */
  .top-glow {
    position: absolute;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 400px;
    height: 200px;
    background: radial-gradient(ellipse, rgba(251, 191, 36, 0.3) 0%, transparent 70%);
    filter: blur(40px);
    pointer-events: none;
  }

  /* ===== MAIN COMPOSITION: A goal target with a crate being pushed toward it ===== */

  /* Stage wrapper - centered */
  .stage {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 380px;
    height: 380px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* The goal target — big glowing ring on the right */
  .goal {
    position: absolute;
    top: 50%;
    right: 20px;
    transform: translateY(-50%);
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(251, 191, 36, 0.25) 0%, rgba(251, 191, 36, 0.05) 50%, transparent 75%);
    box-shadow:
      0 0 60px rgba(251, 191, 36, 0.4),
      0 0 100px rgba(251, 191, 36, 0.2),
      inset 0 0 40px rgba(251, 191, 36, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Goal ring (dashed) */
  .goal-ring {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 8px dashed #fbbf24;
    box-shadow:
      0 0 20px rgba(251, 191, 36, 0.6),
      inset 0 0 20px rgba(251, 191, 36, 0.2);
  }

  /* Goal center dot */
  .goal-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #fbbf24;
    box-shadow: 0 0 30px #fbbf24, 0 0 10px #fde68a;
  }

  /* The crate — wooden box, slightly tilted, mid-motion toward goal */
  .crate {
    position: absolute;
    top: 50%;
    left: 30px;
    transform: translateY(-50%) rotate(-6deg);
    width: 180px;
    height: 180px;
    background: linear-gradient(145deg, #f59e0b 0%, #d97706 40%, #92400e 100%);
    border-radius: 18px;
    box-shadow:
      0 20px 40px rgba(217, 119, 6, 0.5),
      0 8px 16px rgba(0, 0, 0, 0.4),
      inset 0 -10px 0 rgba(0, 0, 0, 0.35),
      inset 0 6px 0 rgba(255, 255, 255, 0.25),
      inset 8px 0 0 rgba(255, 255, 255, 0.12),
      inset -8px 0 0 rgba(0, 0, 0, 0.2);
    position: relative;
  }

  /* Wood plank lines on crate */
  .crate::before {
    content: '';
    position: absolute;
    top: 30%;
    left: 0;
    right: 0;
    height: 6px;
    background: rgba(0, 0, 0, 0.35);
    box-shadow: 0 60px 0 rgba(0, 0, 0, 0.35);
  }

  /* X bracing on crate */
  .crate-x {
    position: absolute;
    inset: 20px;
    pointer-events: none;
  }

  .crate-x::before,
  .crate-x::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 200%;
    height: 8px;
    background: rgba(0, 0, 0, 0.4);
    border-radius: 4px;
  }

  .crate-x::before {
    transform: translate(-50%, -50%) rotate(45deg);
  }

  .crate-x::after {
    transform: translate(-50%, -50%) rotate(-45deg);
  }

  /* Crate highlight (top-left light reflection) */
  .crate-highlight {
    position: absolute;
    top: 14px;
    left: 14px;
    width: 60px;
    height: 40px;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.45) 0%, transparent 80%);
    border-radius: 12px;
    pointer-events: none;
  }

  /* Motion lines — show the crate is being pushed */
  .motion-lines {
    position: absolute;
    top: 50%;
    left: -20px;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 14px;
    pointer-events: none;
  }

  .motion-line {
    height: 6px;
    background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.5) 100%);
    border-radius: 3px;
  }

  .motion-line-1 { width: 50px; }
  .motion-line-2 { width: 70px; margin-right: 10px; }
  .motion-line-3 { width: 40px; margin-right: 20px; }

  /* The player character — small blue circle peeking from behind crate */
  .player {
    position: absolute;
    top: 50%;
    left: -50px;
    transform: translateY(-50%);
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: linear-gradient(145deg, #60a5fa 0%, #3b82f6 50%, #1e40af 100%);
    box-shadow:
      0 8px 20px rgba(59, 130, 246, 0.5),
      inset 0 -6px 0 rgba(0, 0, 0, 0.3),
      inset 0 6px 0 rgba(255, 255, 255, 0.3);
    z-index: 2;
  }

  /* Player eyes */
  .player-eyes {
    position: absolute;
    top: 35%;
    left: 50%;
    transform: translateX(-50%);
    width: 50px;
    display: flex;
    justify-content: space-between;
  }

  .player-eye {
    width: 16px;
    height: 20px;
    background: white;
    border-radius: 50%;
    position: relative;
  }

  .player-eye::after {
    content: '';
    position: absolute;
    top: 4px;
    left: 4px;
    width: 8px;
    height: 10px;
    background: #0f172a;
    border-radius: 50%;
  }

  /* Player smile */
  .player-smile {
    position: absolute;
    bottom: 25%;
    left: 50%;
    transform: translateX(-50%);
    width: 30px;
    height: 12px;
    border-bottom: 4px solid rgba(15, 23, 42, 0.7);
    border-radius: 0 0 30px 30px;
  }

  /* Star burst — celebratory accent */
  .star-burst {
    position: absolute;
    top: 30px;
    right: 30px;
    width: 70px;
    height: 70px;
    z-index: 5;
  }

  .star-shape {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    filter: drop-shadow(0 4px 12px rgba(251, 191, 36, 0.6));
  }

  /* Number badge - shows level/score */
  .badge {
    position: absolute;
    bottom: 30px;
    left: 30px;
    background: linear-gradient(135deg, #10b981 0%, #047857 100%);
    color: white;
    padding: 8px 20px;
    border-radius: 20px;
    font-family: 'Vazirmatn', 'Tahoma', system-ui, sans-serif;
    font-size: 28px;
    font-weight: 900;
    box-shadow:
      0 8px 20px rgba(16, 185, 129, 0.5),
      inset 0 -3px 0 rgba(0, 0, 0, 0.2),
      inset 0 3px 0 rgba(255, 255, 255, 0.2);
    z-index: 10;
    letter-spacing: -1px;
  }

  /* Bottom shadow for depth */
  .bottom-shadow {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 100px;
    background: linear-gradient(to top, rgba(0, 0, 0, 0.4) 0%, transparent 100%);
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="icon">
  <div class="grid-bg"></div>
  <div class="top-glow"></div>

  <div class="stage">
    <!-- Goal target on the right -->
    <div class="goal">
      <div class="goal-ring"></div>
      <div class="goal-dot"></div>
    </div>

    <!-- Player character on the far left -->
    <div class="player">
      <div class="player-eyes">
        <div class="player-eye"></div>
        <div class="player-eye"></div>
      </div>
      <div class="player-smile"></div>
    </div>

    <!-- Motion lines between player and crate -->
    <div class="motion-lines">
      <div class="motion-line motion-line-1"></div>
      <div class="motion-line motion-line-2"></div>
      <div class="motion-line motion-line-3"></div>
    </div>

    <!-- The crate being pushed -->
    <div class="crate">
      <div class="crate-x"></div>
      <div class="crate-highlight"></div>
    </div>
  </div>

  <!-- Star burst top-right -->
  <div class="star-burst">
    <div class="star-shape"></div>
  </div>

  <!-- Score badge bottom-left -->
  <div class="badge">۱۷</div>

  <div class="bottom-shadow"></div>
</div>

</body>
</html>
